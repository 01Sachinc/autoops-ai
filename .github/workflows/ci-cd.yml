name: AutoOps CI/CD

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.11"
        
    - name: Install Backend Dependencies
      run: |
        cd backend
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        
    - name: Set up Node
      uses: actions/setup-node@v4
      with:
        node-version: 20
        
    - name: Install Frontend Dependencies
      run: |
        cd frontend
        npm install
        npm run build

    - name: Build Docker Images
      run: |
        docker build -t autoops-backend ./backend
        docker build -t autoops-frontend ./frontend
